# Source of truth for which accounts/regions get Roles Anywhere + a Teleport
# integration. Edit this, then run:  python3 live/scripts/generate-stacks.py
# That regenerates live/<env>/terragrunt.stack.hcl (one unit per account/region).
#
# create_roles controls whether the target IAM roles are CREATED here (test
# accounts that don't have them yet) or REFERENCED as existing roles (which must
# already trust Roles Anywhere — see docs/reusing-existing-iam-roles.md).
# Resolution: account → environment → defaults. Same for `regions` and `roles`.
#
# IAM roles are GLOBAL: when create_roles is true the generator creates them in
# only the account's FIRST region and references that same role from the other
# regions (which wait on the creator unit). So multi-region accounts never try
# to create the same role name twice. The regional RA resources (trust anchor,
# profiles) are still created in every region.

defaults:
  regions: [us-east-1, us-west-2]
  create_roles: false # default: reference existing roles
  # access_level => IAM role name + (for creation) managed policies.
  # okta_group / access are consumed by the teleport/access-roles unit (not by the
  # AWS stacks): okta_group is the SAML "groups" value that maps to this tier, and
  # access is "direct" (auto-granted on login) or "request" (must be access-requested).
  # The mapping to paste into the Okta SAML connector is the module's
  # `attributes_to_roles` output — the connector itself is not managed here.
  roles:
    readonly:
      name: ReadOnly
      managed_policy_arns: ["arn:aws:iam::aws:policy/ReadOnlyAccess"]
      okta_group: eg-aws-readonly # replace with your real Okta group
      access: direct              # auto-granted to members of okta_group
    poweruser:
      name: PowerUser
      managed_policy_arns: ["arn:aws:iam::aws:policy/PowerUserAccess"]
      okta_group: eg-aws-poweruser
      access: request             # members of okta_group may REQUEST this tier
    admin:
      name: Admin
      managed_policy_arns: ["arn:aws:iam::aws:policy/AdministratorAccess"]
      okta_group: eg-aws-admin
      access: request

environments:
  test:
    create_roles: true # test accounts don't have the roles yet → create them
    accounts:
      # Auth via static keys in a named profile (live/.aws-credentials), since
      # these test accounts use a direct `terraform` IAM user (no tec-deployer).
      - name: test-1
        account_id: "111111111111"
        aws_profile: teleport-test-1
      - name: test-2
        account_id: "222222222222"
        aws_profile: teleport-test-2

  prod:
    # create_roles inherits the default (false) → reference existing roles.
    # Auth via assume-role into the per-account deployer role.
    accounts:
      - name: prod-1
        account_id: "333333333333"
        deployer_role_arn: "arn:aws:iam::333333333333:role/tec-deployer-role"
        # Per-account override: this one also has an EU region.
        regions: [us-east-1, us-west-2, eu-west-1]
